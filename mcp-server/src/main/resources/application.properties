quarkus.http.port=8090

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=gilles
quarkus.datasource.password=password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/mcp-server

# Disable Dev Services since we manage PostgreSQL via Docker Compose
quarkus.devservices.enabled=false

# Liquibase - run migrations automatically at startup
quarkus.liquibase.change-log=db/changelog/db.changelog-master.yml
quarkus.liquibase.migrate-at-start=true

# JPA - rely on Liquibase for schema management
quarkus.hibernate-orm.database.generation=none

# REST client base URLs for Open-Meteo APIs
quarkus.rest-client.weather-api.url=https://api.open-meteo.com
quarkus.rest-client.geocoding-api.url=https://geocoding-api.open-meteo.com

# OIDC - validate Bearer tokens issued by the Keycloak mcp realm
quarkus.oidc.auth-server-url=http://localhost:8180/realms/mcp
quarkus.oidc.client-id=mcp-server
quarkus.oidc.application-type=service

# Require authenticated Bearer token on all MCP endpoints
quarkus.http.auth.permission.authenticated.paths=/mcp/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Allow OAuth metadata discovery without authentication
quarkus.http.auth.permission.public.paths=/.well-known/*
quarkus.http.auth.permission.public.policy=permit

# CORS - required for MCP Inspector (browser on :6274) to reach MCP and OAuth endpoints
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:6274
quarkus.http.cors.methods=GET,POST,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,MCP-Protocol-Version
