logging.level.org.springframework.security: TRACE
server:
  port: 9000
  servlet.session.cookie.name: MCP_AUTHORIZATION_SERVER_SESSIONID # allows running multiple Spring apps on localhost (they'll each have their own cookie)
spring:
  application.name: mcp-authorization-server
  docker.compose.enabled: false
  security:
    oauth2.authorizationserver.client.default-client:
      token.access-token-time-to-live: 1h
      registration:
        client-id: "default-client"
        client-secret: "{noop}default-secret"
        client-authentication-methods:
          - "client_secret_basic"
          - "client_secret_post"
          - "none"
        authorization-grant-types:
          - "authorization_code"
          - "client_credentials"
        redirect-uris:
          - "http://127.0.0.1:8080/authorize/oauth2/code/authserver"
          - "http://localhost:8080/authorize/oauth2/code/authserver"
          - "http://127.0.0.1:8081/authorize/oauth2/code/authserver"
          - "http://localhost:8081/authorize/oauth2/code/authserver"
          - "http://localhost:6274/oauth/callback" # mcp-inspector
          - "https://claude.ai/api/mcp/auth_callback"
    user:
      name: user
      password: password
